version: "3.7"
services:
    fmanager:
        build:
            args:
                user: filip
                uid: 1000
            context: ./
            dockerfile: ./docker/php/Dockerfile
        container_name: fmanager-container
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - fmanager
    composer:
        image: composer:2
        command: [ "install" ]
        entrypoint: [ "composer" ]
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        profiles:
            - install
    pnpm:
        build:
            dockerfile: docker/pnpm/Dockerfile
            context: .
            target: dev
        volumes:
            - ./:/workspace
            - /var/run/docker.sock:/var/run/docker.sock
        working_dir: /workspace
        entrypoint: [ "/entrypoint.sh" ]
        environment:
            VITE_WAYFINDER_ENABLED: 1
        ports:
            - 5173:3000
        profiles:
            - install
    nginx:
        build:
            dockerfile: docker/nginx/Dockerfile
            context: .
            target: base
        container_name: fmanager-nginx
        restart: unless-stopped
        environment:
            VIRTUAL_HOST: fmanager.local
            VIRTUAL_PORT: 80
        ports:
            - 8000:80
        volumes:
            - ./:/var/www
            - ./docker/nginx:/etc/nginx/conf.d/
        networks:
            - fmanager
networks:
    fmanager:
        driver: bridge

